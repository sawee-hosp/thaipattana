<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Sawee Rxfill (VMI Edition)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
    .bg-gradient-main { background: linear-gradient(135deg, #0d9488 0%, #059669 100%); }
    .text-gradient { background: linear-gradient(135deg, #0d9488 0%, #059669 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    @media print {
      body * { visibility: hidden; }
      .print-area, .print-area * { visibility: visible; }
      .print-area { position: absolute; left: 0; top: 0; width: 100%; }
      .no-print { display: none !important; }
    }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #0d9488; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .animate-fade-in { animation: fadeIn 0.4s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    /* Hide scrollbar for tabs */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="text-slate-800 flex flex-col min-h-screen">
  <div id="root" class="flex-grow"></div>

  <!-- Footer -->
  <footer class="bg-slate-800 text-slate-400 py-4 text-center text-sm no-print mt-auto border-t-4 border-emerald-500">
    <p>Sawee Rxfill System | VMI & Logistics Management</p>
    <p class="mt-1 font-medium text-emerald-400"><i class="fa-solid fa-phone mr-1"></i> กรณีมีปัญหาการใช้งาน กรุณาติดต่อ Admin: 089-290-9255</p>
  </footer>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo } = React;

    // ⭐️ 1. ตั้งค่า Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyAnzXAEkH8Zz0Ur4lCQ00qa4UqYATTikAs",
      authDomain: "sawee-rxfill.firebaseapp.com",
      projectId: "sawee-rxfill",
      storageBucket: "sawee-rxfill.firebasestorage.app",
      messagingSenderId: "186506077335",
      appId: "1:186506077335:web:71c5f6f90bb26e767df5d2",
      measurementId: "G-XFL0L1L213"
    };

    // ⭐️ 2. ใส่ Web App URL ของ Google Apps Script ที่ใช้รับไฟล์ PDF
    const GAS_DRIVE_URL = "https://script.google.com/macros/s/AKfycbyxqnZlYJKW22S_DO9PnYFQYsxs6SMbUVI5ckB7yZCDC6KhlqKpE8incdkzmuyVILCd/exec"; 

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    const auth = firebase.auth();

    const Toast = ({ message, type, onClose }) => {
      useEffect(() => {
        const timer = setTimeout(onClose, 3000);
        return () => clearTimeout(timer);
      }, [onClose]);
      const bgColor = type === 'error' ? 'bg-red-500' : 'bg-emerald-500';
      return (
        <div className={`fixed top-6 right-6 ${bgColor} text-white px-6 py-4 rounded-xl shadow-2xl flex items-center z-50 animate-fade-in font-medium`}>
          <i className={`fa-solid ${type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check'} mr-3 text-xl`}></i>
          {message}
        </div>
      );
    };

    // ฟังก์ชันช่วยจัดเรียงยา (ยา 5 หลักขึ้นก่อน เวชภัณฑ์ 3 หลักอยู่หลัง)
    const sortDrugs = (a, b) => {
      const idA = String(a.drugId || a.drug_id || "");
      const idB = String(b.drugId || b.drug_id || "");
      const isDrugA = idA.length >= 5;
      const isDrugB = idB.length >= 5;
      if (isDrugA && !isDrugB) return -1;
      if (!isDrugA && isDrugB) return 1;
      return idA.localeCompare(idB);
    };

    function App() {
      const [loading, setLoading] = useState(true);
      const [appDb, setAppDb] = useState(null); 
      const [currentUser, setCurrentUser] = useState(null);
      const [currentView, setCurrentView] = useState('login');
      const [toast, setToast] = useState(null);
      const [currentReqId, setCurrentReqId] = useState(null);

      const [editReqId, setEditReqId] = useState(null); 

      const showToast = (message, type = 'success') => setToast({ message, type });

      const refreshData = async () => {
        try {
          const [hospSnap, unitSnap, drugSnap, parSnap, balSnap, reqSnap, userSnap] = await Promise.all([
            db.collection('master_hospitals').get(),
            db.collection('master_unit').get(),
            db.collection('master_drugs').get(),
            db.collection('config_par').get(),
            db.collection('current_excess').get(),
            db.collection('requisitions').orderBy('created_at', 'desc').get(),
            db.collection('users').get()
          ]);

          const units = unitSnap.docs.map(d => ({ id: d.id, ...d.data() }));
          const drugs = drugSnap.docs.map(d => {
            const data = d.data();
            const matchedUnit = units.find(u => u.unit_id === data.unit_id);
            return { ...data, unit_display_name: matchedUnit ? matchedUnit.unit_name : data.unit_id };
          });
          
          setAppDb({
            hospitals: hospSnap.docs.map(d => ({ id: d.id, ...d.data() })),
            units: units,
            drugs: drugs,
            parLevels: parSnap.docs.map(d => ({ id: d.id, ...d.data() })),
            balances: balSnap.docs.map(d => ({ id: d.id, ...d.data() })),
            requisitions: reqSnap.docs.map(d => ({ id: d.id, ...d.data() })),
            usersList: userSnap.docs.map(d => ({ id: d.id, ...d.data() }))
          });
        } catch (error) {
          console.error(error);
          showToast('เชื่อมต่อฐานข้อมูลล้มเหลว', 'error');
        }
      };

      const fetchData = async () => {
        setLoading(true);
        await refreshData();
        setLoading(false);
      };

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged(async (user) => {
          if (user) {
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (userDoc.exists) {
              setCurrentUser({ uid: user.uid, email: user.email, ...userDoc.data() });
              setCurrentView('dashboard');
            }
          } else {
            setCurrentUser(null);
            setCurrentView('login');
          }
          fetchData(); 
        });
        return () => unsubscribe();
      }, []);

      const handleLogin = async (email, password, rememberMe = true) => {
        setLoading(true);
        try {
          await auth.setPersistence(rememberMe ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION);
          await auth.signInWithEmailAndPassword(email, password);
          showToast('เข้าสู่ระบบสำเร็จ');
        } catch (error) {
          showToast('อีเมลหรือรหัสผ่านไม่ถูกต้อง', 'error');
          setLoading(false);
        }
      };

      if (loading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
            <div className="loader mb-4"></div>
            <p className="text-emerald-600 font-semibold animate-pulse">กำลังโหลดข้อมูล...</p>
          </div>
        );
      }

      const LoginView = () => {
        const [email, setEmail] = useState('');
        const [password, setPassword] = useState('');
        const [rememberMe, setRememberMe] = useState(true);
        const [showForgot, setShowForgot] = useState(false);
        const [forgotEmail, setForgotEmail] = useState('');

        const handleForgot = async () => {
          if(!forgotEmail) return showToast('กรุณากรอกอีเมล', 'error');
          try {
            await auth.sendPasswordResetEmail(forgotEmail);
            showToast('ส่งลิงก์รีเซ็ตรหัสผ่านไปที่อีเมลแล้ว');
            setShowForgot(false);
            setForgotEmail('');
          } catch(e) { showToast(e.message, 'error'); }
        };

        return (
          <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100">
            <div className="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md border border-slate-100">
              <div className="flex flex-col items-center mb-8">
                <div className="bg-gradient-main p-4 rounded-2xl text-white mb-4 shadow-lg shadow-emerald-200">
                  <i className="fa-solid fa-truck-medical text-3xl"></i>
                </div>
                <h1 className="text-3xl font-extrabold text-slate-800 tracking-tight">Sawee Rxfill</h1>
                <p className="text-slate-500 text-sm mt-1">ระบบเติมยาและเวชภัณฑ์ VMI</p>
              </div>
              <div className="space-y-5">
                <div>
                  <label className="text-sm font-semibold text-slate-600 ml-1 mb-1 block">อีเมลเข้าสู่ระบบ</label>
                  <input type="email" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500 transition" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} />
                </div>
                <div>
                  <label className="text-sm font-semibold text-slate-600 ml-1 mb-1 block">รหัสผ่าน</label>
                  <input type="password" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500 transition" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleLogin(email, password, rememberMe)} />
                </div>
                <label className="flex items-center text-sm text-slate-600 cursor-pointer">
                  <input type="checkbox" className="mr-2 w-4 h-4 text-emerald-600 rounded" checked={rememberMe} onChange={e => setRememberMe(e.target.checked)} />
                  จดจำการเข้าสู่ระบบ
                </label>
                <button onClick={() => handleLogin(email, password, rememberMe)} className="w-full bg-gradient-main text-white rounded-xl p-4 font-bold hover:opacity-90 transition shadow-lg shadow-emerald-200">
                  เข้าสู่ระบบ
                </button>
              </div>
              <div className="mt-6 flex justify-between text-sm">
                <button onClick={() => setCurrentView('register')} className="text-emerald-600 font-semibold hover:underline">ลงทะเบียนผู้ใช้ใหม่</button>
                <button onClick={() => setShowForgot(true)} className="text-slate-500 font-semibold hover:underline">ลืมรหัสผ่าน?</button>
              </div>
            </div>

            {showForgot && (
              <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 px-4 animate-fade-in">
                <div className="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl">
                  <h3 className="text-xl font-bold text-slate-800 mb-2">รีเซ็ตรหัสผ่าน</h3>
                  <p className="text-sm text-slate-500 mb-4">กรุณากรอกอีเมลของคุณเพื่อรับลิงก์สำหรับตั้งรหัสผ่านใหม่</p>
                  <input type="email" className="w-full border border-slate-300 rounded-lg p-3 mb-4 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="อีเมล" value={forgotEmail} onChange={e => setForgotEmail(e.target.value)} />
                  <div className="flex justify-end gap-3">
                    <button onClick={() => setShowForgot(false)} className="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg font-semibold hover:bg-slate-200">ยกเลิก</button>
                    <button onClick={handleForgot} className="px-4 py-2 bg-emerald-600 text-white rounded-lg font-semibold hover:bg-emerald-700">ส่งลิงก์</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      };

      const RegisterView = () => {
        const [formData, setFormData] = useState({ email: '', password: '', name: '', hospitalId: '' });
        const [isSubmitting, setIsSubmitting] = useState(false);

        const handleRegister = async () => {
          if(!formData.hospitalId) return showToast('กรุณาระบุ รพ.สต.', 'error');
          setIsSubmitting(true);
          try {
            const userCredential = await auth.createUserWithEmailAndPassword(formData.email, formData.password);
            await db.collection('users').doc(userCredential.user.uid).set({
              name: formData.name, hospital_id: formData.hospitalId, role: 'hospital', created_at: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast('ลงทะเบียนสำเร็จ');
          } catch (error) {
            showToast(error.message, 'error');
          } finally { setIsSubmitting(false); }
        };

        return (
          <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100">
            <div className="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md">
              <h2 className="text-2xl font-bold mb-6 text-center text-slate-800">ลงทะเบียนเข้าใช้งาน</h2>
              <div className="space-y-4">
                <input type="text" className="w-full bg-slate-50 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="ชื่อ-นามสกุล" onChange={e => setFormData({...formData, name: e.target.value})} />
                <select className="w-full bg-slate-50 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" onChange={e => setFormData({...formData, hospitalId: e.target.value})}>
                  <option value="">-- เลือก รพ.สต. ที่สังกัด --</option>
                  {appDb?.hospitals?.map(h => <option key={h.hospital_id} value={h.hospital_id}>{h.hospital_name}</option>)}
                </select>
                <input type="email" className="w-full bg-slate-50 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="อีเมล (ใช้ล็อกอิน)" onChange={e => setFormData({...formData, email: e.target.value})} />
                <input type="password" className="w-full bg-slate-50 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="รหัสผ่าน" onChange={e => setFormData({...formData, password: e.target.value})} />
                
                <button onClick={handleRegister} disabled={isSubmitting} className="w-full bg-gradient-main text-white rounded-xl p-4 font-bold shadow-lg shadow-emerald-200 mt-4 hover:opacity-90">
                  {isSubmitting ? 'กำลังบันทึก...' : 'ยืนยันลงทะเบียน'}
                </button>
                <button onClick={() => setCurrentView('login')} className="w-full text-slate-500 mt-2 hover:underline">กลับหน้าล็อกอิน</button>
              </div>
            </div>
          </div>
        );
      };

      const DashboardView = () => {
        const isHospital = currentUser?.role === 'hospital';
        const myReqs = isHospital ? appDb.requisitions.filter(r => r.hospitalId === currentUser.hospital_id) : appDb.requisitions;
        const colleagues = isHospital ? appDb.usersList.filter(u => u.hospital_id === currentUser.hospital_id && u.id !== currentUser.uid) : [];
        
        const today = new Date();
        const currentMonth = today.getMonth() + 1;
        const currentYear = today.getFullYear();
        const currentMonthReq = isHospital ? myReqs.find(r => r.month === currentMonth && r.year === currentYear) : null;

        const handleReqAction = () => {
          if (!currentMonthReq) {
            setEditReqId(null);
            setCurrentView('create_req');
          } else if (currentMonthReq.status === 'Pending') {
            setEditReqId(currentMonthReq.id);
            setCurrentView('create_req');
          }
        };

        return (
          <div className="space-y-8 animate-fade-in">
            <div className="flex flex-col md:flex-row justify-between items-start md:items-end bg-white p-6 rounded-2xl shadow-sm border border-slate-100 gap-4">
              <div>
                <h2 className="text-3xl font-extrabold text-slate-800">ภาพรวมระบบเติมยา</h2>
                <p className="text-slate-500 mt-1 text-lg">สวัสดี, <span className="font-semibold text-emerald-600">{currentUser.name}</span></p>
                {isHospital && <p className="text-sm text-slate-400 mt-1"><i className="fa-solid fa-location-dot"></i> {appDb.hospitals.find(h=>h.hospital_id === currentUser.hospital_id)?.hospital_name}</p>}
              </div>
              <div className="space-x-3 flex flex-wrap gap-y-2">
                {isHospital && (
                  <button onClick={() => setCurrentView('adjust_stock')} className="bg-white border-2 border-emerald-500 text-emerald-600 px-6 py-3 rounded-xl font-bold hover:bg-emerald-50 transition">
                    <i className="fa-solid fa-boxes-stacked mr-2"></i> ปรับสต๊อกยอดยกมา
                  </button>
                )}
                {isHospital && (
                  <button 
                    onClick={handleReqAction} 
                    disabled={currentMonthReq && currentMonthReq.status === 'Completed'}
                    className={`px-6 py-3 rounded-xl font-bold shadow-lg transition flex items-center ${currentMonthReq && currentMonthReq.status === 'Completed' ? 'bg-slate-300 text-slate-500 cursor-not-allowed' : currentMonthReq && currentMonthReq.status === 'Pending' ? 'bg-amber-500 text-white hover:bg-amber-600 shadow-amber-200' : 'bg-gradient-main text-white hover:scale-105 shadow-emerald-200'}`}
                  >
                    {currentMonthReq && currentMonthReq.status === 'Completed' ? <><i className="fa-solid fa-lock mr-2"></i> เบิกแล้ว (รอรอบหน้า)</> :
                     currentMonthReq && currentMonthReq.status === 'Pending' ? <><i className="fa-solid fa-pen mr-2"></i> แก้ไขใบเบิกรอบนี้</> : 
                     <><i className="fa-solid fa-boxes-packing mr-2"></i> ทำเรื่องเติมยา</>}
                  </button>
                )}
              </div>
            </div>
            
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              <div className="bg-white rounded-2xl shadow-sm p-6 border border-slate-100 flex items-center">
                <div className="bg-blue-100 p-4 rounded-xl text-blue-600 mr-4"><i className="fa-solid fa-file-invoice text-2xl"></i></div>
                <div><div className="text-slate-500 font-medium">ประวัติทั้งหมด</div><div className="text-3xl font-extrabold">{myReqs.length}</div></div>
              </div>
              <div className="bg-white rounded-2xl shadow-sm p-6 border border-slate-100 flex items-center">
                <div className="bg-amber-100 p-4 rounded-xl text-amber-600 mr-4"><i className="fa-solid fa-clock text-2xl"></i></div>
                <div><div className="text-slate-500 font-medium">รอห้องยาอนุมัติ</div><div className="text-3xl font-extrabold">{myReqs.filter(r => r.status === 'Pending').length}</div></div>
              </div>
              <div className="bg-white rounded-2xl shadow-sm p-6 border border-slate-100 flex items-center">
                <div className="bg-emerald-100 p-4 rounded-xl text-emerald-600 mr-4"><i className="fa-solid fa-check-double text-2xl"></i></div>
                <div><div className="text-slate-500 font-medium">จัดยาแล้ว</div><div className="text-3xl font-extrabold">{myReqs.filter(r => r.status === 'Completed').length}</div></div>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <div className="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <div className="p-5 border-b border-slate-100 font-bold text-slate-800 bg-slate-50"><i className="fa-solid fa-list-ul text-emerald-500 mr-2"></i> ประวัติการเติมยา</div>
                <table className="w-full text-left border-collapse">
                  <thead>
                    <tr className="border-b text-sm text-slate-500 bg-white">
                      <th className="p-4 font-medium">รหัสเอกสาร</th>
                      <th className="p-4 font-medium">รอบบิล</th>
                      <th className="p-4 font-medium">สถานะ</th>
                      <th className="p-4 font-medium text-right">เอกสาร</th>
                    </tr>
                  </thead>
                  <tbody>
                    {myReqs.map(req => (
                      <tr key={req.id} className="border-b hover:bg-slate-50 transition cursor-pointer" onClick={() => { setCurrentReqId(req.id); setCurrentView('view_req'); }}>
                        <td className="p-4 font-semibold text-slate-700">{req.id}</td>
                        <td className="p-4 text-slate-600">{req.month}/{req.year}</td>
                        <td className="p-4">
                          <span className={`px-3 py-1 rounded-lg text-xs font-bold ${req.status === 'Pending' ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700'}`}>
                            {req.status === 'Pending' ? 'กำลังดำเนินการ' : 'สำเร็จ'}
                          </span>
                        </td>
                        <td className="p-4 text-right">
                           <button className="text-emerald-600 hover:text-emerald-800 bg-emerald-50 px-3 py-1.5 rounded-lg text-sm font-semibold">
                             เปิดดูรายการ
                           </button>
                        </td>
                      </tr>
                    ))}
                    {myReqs.length === 0 && <tr><td colSpan="4" className="p-8 text-center text-slate-400">ยังไม่มีประวัติ</td></tr>}
                  </tbody>
                </table>
              </div>

              {isHospital && (
                <div className="bg-white rounded-2xl shadow-sm border border-slate-100 h-fit">
                  <div className="p-5 border-b border-slate-100 font-bold text-slate-800 bg-slate-50"><i className="fa-solid fa-users text-blue-500 mr-2"></i> เจ้าหน้าที่ รพ.สต. เดียวกัน</div>
                  <div className="p-4 space-y-3">
                    {colleagues.length > 0 ? colleagues.map(c => (
                      <div key={c.id} className="flex items-center p-3 bg-slate-50 rounded-xl">
                        <div className="w-10 h-10 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center font-bold text-lg mr-3">
                          {c.name.charAt(0)}
                        </div>
                        <div>
                          <div className="font-semibold text-slate-700 text-sm">{c.name}</div>
                          <div className="text-xs text-slate-500">{c.role}</div>
                        </div>
                      </div>
                    )) : <div className="text-center text-slate-400 text-sm py-4">ไม่มีเจ้าหน้าที่คนอื่น</div>}
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      };

      const AdjustStockView = () => {
        const hospId = currentUser.hospital_id;
        const [searchTerm, setSearchTerm] = useState('');
        const [showMyStockOnly, setShowMyStockOnly] = useState(true); // ⭐️ Toggle
        const [selectedDrug, setSelectedDrug] = useState(null);
        const [newBalance, setNewBalance] = useState('');
        const [reason, setReason] = useState('');
        const [isSaving, setIsSaving] = useState(false);

        const drugList = useMemo(() => {
          if (!appDb) return [];
          const myPars = appDb.parLevels.filter(p => String(p.hospital_id) === String(hospId));
          const myParDrugIds = myPars.map(p => String(p.drug_id));

          let listToProcess = appDb.drugs;
          if (showMyStockOnly) {
             listToProcess = appDb.drugs.filter(d => myParDrugIds.includes(String(d.drug_id)));
          }

          let list = listToProcess.map(drug => {
            const bal = appDb.balances.find(b => String(b.hospital_id) === String(hospId) && String(b.drug_id) === String(drug.drug_id));
            return {
              drugId: drug.drug_id,
              name: drug.drug_name || 'N/A',
              unit: drug.unit_display_name || '',
              currentBal: bal ? Number(bal.excess_balance) : 0
            };
          });
          return list.sort(sortDrugs);
        }, [appDb, hospId, showMyStockOnly]);

        const filteredList = drugList.filter(d => d.name.toLowerCase().includes(searchTerm.toLowerCase()) || String(d.drugId).includes(searchTerm.toLowerCase()));

        const handleSaveAdjust = async () => {
          if(!selectedDrug) return showToast('กรุณาเลือกรายการยา', 'error');
          if(newBalance === '') return showToast('กรุณาระบุยอดยกมาใหม่', 'error');
          if(!reason.trim()) return showToast('บังคับต้องระบุเหตุผลในการปรับ', 'error');
          
          setIsSaving(true);
          try {
            const docId = `${hospId}_${selectedDrug.drugId}`;
            const batch = db.batch();
            
            batch.set(db.collection('current_excess').doc(docId), {
              hospital_id: hospId, drug_id: selectedDrug.drugId, excess_balance: Number(newBalance), last_updated: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });

            batch.set(db.collection('stock_adjustments').doc(), {
              hospital_id: hospId, drug_id: selectedDrug.drugId, 
              old_balance: selectedDrug.currentBal, new_balance: Number(newBalance), 
              reason: reason, user_name: currentUser.name, date: firebase.firestore.FieldValue.serverTimestamp()
            });

            await batch.commit();
            showToast('ปรับสต๊อกเรียบร้อยแล้ว');
            setNewBalance(''); setReason(''); setSelectedDrug(null);
            await refreshData();
          } catch(e) {
            showToast(e.message, 'error');
          } finally {
            setIsSaving(false);
          }
        };

        return (
          <div className="bg-white rounded-2xl shadow-sm p-8 border border-slate-100 animate-fade-in max-w-4xl mx-auto">
            <div className="flex justify-between items-center mb-6 pb-4 border-b border-slate-100">
              <div>
                <h2 className="text-2xl font-bold text-slate-800">ปรับปรุงยอดยกมา (Adjust Stock)</h2>
                <p className="text-slate-500 mt-1">กรณีที่สต๊อกในระบบไม่ตรงกับความจริง เช่น ยาหมดอายุ, คีย์เบิกผิดพลาด</p>
              </div>
              <button onClick={() => setCurrentView('dashboard')} className="text-slate-400 hover:text-slate-600 bg-slate-100 px-4 py-2 rounded-xl font-medium">กลับหน้าหลัก</button>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
              {/* เลือดยา */}
              <div>
                <div className="mb-4 relative">
                  <i className="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-400"></i>
                  <input type="text" placeholder="ค้นหารายการยา..." className="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 transition" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                </div>
                <label className="flex items-center gap-2 cursor-pointer mb-4 text-emerald-700 font-semibold bg-emerald-50 p-2 rounded-lg border border-emerald-200">
                  <input type="checkbox" className="w-5 h-5 accent-emerald-600" checked={showMyStockOnly} onChange={e=>setShowMyStockOnly(e.target.checked)} /> 
                  แสดงเฉพาะยาที่มีในคลังย่อย (ตั้ง Par ไว้)
                </label>
                <div className="border border-slate-200 rounded-xl max-h-[400px] overflow-y-auto">
                  {filteredList.map(d => (
                    <div key={d.drugId} onClick={() => { setSelectedDrug(d); setNewBalance(''); setReason(''); }} className={`p-4 border-b cursor-pointer transition ${selectedDrug?.drugId === d.drugId ? 'bg-emerald-50 border-l-4 border-l-emerald-500' : 'hover:bg-slate-50 border-l-4 border-l-transparent'}`}>
                      <div className="font-bold text-slate-800">{d.name} <span className="text-xs font-normal text-slate-500 ml-1">[{d.drugId}]</span></div>
                      <div className="text-sm text-slate-500 mt-1">ยอดปัจจุบันในระบบ: <span className="font-bold text-blue-600">{d.currentBal}</span> {d.unit}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* ฟอร์ม */}
              <div className="bg-slate-50 p-6 rounded-xl border border-slate-200 h-fit">
                {selectedDrug ? (
                  <div className="space-y-4 animate-fade-in">
                    <h3 className="font-bold text-lg text-slate-800 border-b pb-2">รายละเอียดการปรับแก้</h3>
                    <div>
                      <label className="block text-sm font-semibold text-slate-600 mb-1">รายการยา</label>
                      <div className="font-bold text-emerald-700 bg-emerald-100/50 p-3 rounded-lg border border-emerald-200">{selectedDrug.name} <span className="text-xs font-normal">[{selectedDrug.drugId}]</span></div>
                    </div>
                    <div className="flex gap-4">
                      <div className="flex-1">
                        <label className="block text-sm font-semibold text-slate-600 mb-1">ยอดเดิม</label>
                        <input type="text" disabled value={selectedDrug.currentBal} className="w-full bg-slate-200 border-none rounded-lg p-3 text-slate-500 font-bold" />
                      </div>
                      <div className="flex-1">
                        <label className="block text-sm font-semibold text-red-600 mb-1">ยอดใหม่ที่ถูกต้อง <span className="text-xs font-normal">({selectedDrug.unit})</span></label>
                        <input type="number" min="0" value={newBalance} onChange={e=>setNewBalance(e.target.value)} className="w-full border-2 border-red-300 rounded-lg p-3 font-bold text-red-700 outline-none focus:border-red-500" placeholder="0" />
                      </div>
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-slate-600 mb-1">เหตุผลในการปรับยอด (บังคับ) <span className="text-red-500">*</span></label>
                      <textarea rows="3" value={reason} onChange={e=>setReason(e.target.value)} className="w-full border border-slate-300 rounded-lg p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="เช่น ยาเสื่อมสภาพ, นับสต๊อกสิ้นเดือน, คีย์เบิกผิดรอบที่แล้ว..."></textarea>
                    </div>
                    <button onClick={handleSaveAdjust} disabled={isSaving} className="w-full bg-emerald-600 text-white rounded-lg p-4 font-bold shadow-lg shadow-emerald-200 hover:bg-emerald-700 transition disabled:opacity-50 mt-4">
                      {isSaving ? 'กำลังบันทึก...' : 'บันทึกการปรับสต๊อก'}
                    </button>
                  </div>
                ) : (
                  <div className="text-center text-slate-400 py-20">
                    <i className="fa-solid fa-hand-pointer text-4xl mb-3 opacity-50"></i>
                    <p>คลิกเลือกรายการยาจากตารางด้านซ้าย<br/>เพื่อทำการปรับยอด</p>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      };

      const CreateReqView = () => {
        const hospId = currentUser.hospital_id;
        const isAdmin = currentUser.role === 'admin';
        const today = new Date();
        const isOutOfPeriod = today.getDate() < 25 && !isAdmin;
        const currentMonth = today.getMonth() + 1;
        const currentYear = today.getFullYear();
        
        const [acknowledged, setAcknowledged] = useState(false);
        const [searchTerm, setSearchTerm] = useState(''); 
        const [filterType, setFilterType] = useState('all'); // all, drug, supply
        const [showUsedOnly, setShowUsedOnly] = useState(false); 
        const [multiplier, setMultiplier] = useState(1.25);
        const [proofFile, setProofFile] = useState(null);
        const [isSubmitting, setIsSubmitting] = useState(false);

        const [items, setItems] = useState(() => {
          if (!appDb || !appDb.parLevels) return [];
          
          let existingReqItems = [];
          if (editReqId) {
             const reqToEdit = appDb.requisitions.find(r => r.id === editReqId);
             if (reqToEdit) existingReqItems = reqToEdit.items || [];
          }

          const myPars = appDb.parLevels.filter(p => String(p.hospital_id) === String(hospId));
          const generatedList = myPars.map(par => {
            const drug = appDb.drugs.find(d => String(d.drug_id) === String(par.drug_id));
            const bal = appDb.balances.find(b => String(b.hospital_id) === String(hospId) && String(b.drug_id) === String(par.drug_id));
            
            const existingItem = existingReqItems.find(ex => ex.drugId === par.drug_id);
            const prevExcess = bal ? Number(bal.excess_balance) : 0;
            
            let totalHist = 0; let count = 0;
            for(let i=1; i<=3; i++) {
              let m = currentMonth - i; let y = currentYear;
              if(m <= 0) { m += 12; y -= 1; }
              const oldReq = appDb.requisitions.find(r => r.hospitalId === hospId && r.month === m && r.year === y && r.id !== editReqId);
              if(oldReq && oldReq.items) {
                const oldItem = oldReq.items.find(it => it.drugId === par.drug_id);
                if(oldItem) { totalHist += Number(oldItem.usage); count++; }
              }
            }
            const avgUsage = count > 0 ? Math.ceil(totalHist / 3) : 0; 

            if (existingItem) return { ...existingItem, avgUsage: avgUsage };

            return {
              drugId: par.drug_id, 
              name: drug ? drug.drug_name : 'N/A', 
              unit: drug ? drug.unit_display_name : '',
              packSize: drug ? Number(drug.pack_size) : 1,
              avgUsage: avgUsage,
              prevExcess: prevExcess, 
              usage: 0, vmiTarget: 0, netNeed: 0, dispensePack: 0, dispenseQty: 0, newExcess: prevExcess
            };
          });

          return generatedList.sort(sortDrugs);
        });

        if (isOutOfPeriod && !acknowledged && !editReqId) {
          return (
            <div className="bg-white rounded-3xl p-10 text-center shadow-sm max-w-2xl mx-auto mt-10 border border-amber-200 animate-fade-in">
              <i className="fa-solid fa-triangle-exclamation text-6xl text-amber-500 mb-6"></i>
              <h2 className="text-2xl font-bold text-slate-800 mb-3">แจ้งเตือน: นอกช่วงเวลาเบิกยา</h2>
              <p className="text-slate-500 mb-8 text-lg">ระบบแนะนำให้ทำเรื่องเติมยาเฉพาะ <span className="font-bold text-slate-700">วันที่ 25 ถึงวันสิ้นเดือน</span> เพื่อให้การคำนวณ VMI แม่นยำที่สุด</p>
              <div className="flex flex-col sm:flex-row justify-center gap-4">
                <button onClick={() => setCurrentView('dashboard')} className="bg-slate-100 text-slate-600 px-6 py-3 rounded-xl font-bold hover:bg-slate-200 transition">กลับหน้าหลัก</button>
                <button onClick={() => setAcknowledged(true)} className="bg-gradient-to-r from-amber-400 to-orange-500 text-white px-6 py-3 rounded-xl font-bold hover:scale-105 transition shadow-lg shadow-amber-200">รับทราบ และทำรายการต่อ</button>
              </div>
            </div>
          );
        }

        const updateRow = (drugIdToUpdate, usageVal, multiVal = multiplier) => {
          const usage = parseInt(usageVal) || 0;
          const newItems = items.map(item => {
            if (item.drugId === drugIdToUpdate) {
              const row = { ...item, usage };
              row.vmiTarget = Math.ceil(row.avgUsage * multiVal);
              let netNeed = row.vmiTarget - row.prevExcess;
              
              if (netNeed <= 0) {
                 row.netNeed = 0; row.dispensePack = 0; row.dispenseQty = 0; 
                 row.newExcess = row.prevExcess - usage; 
              } else {
                 row.netNeed = netNeed; 
                 row.dispensePack = Math.ceil(netNeed / row.packSize);
                 row.dispenseQty = row.dispensePack * row.packSize; 
                 row.newExcess = (row.prevExcess - usage) + row.dispenseQty;
              }
              return row;
            }
            return item;
          });
          setItems(newItems);
        };

        const handleMultiplierChange = (e) => {
          const m = parseFloat(e.target.value);
          setMultiplier(m);
          setItems(items.map(item => {
            const row = { ...item };
            row.vmiTarget = Math.ceil(row.avgUsage * m);
            let netNeed = row.vmiTarget - row.prevExcess;
            if (netNeed <= 0) {
               row.netNeed = 0; row.dispensePack = 0; row.dispenseQty = 0; 
               row.newExcess = row.prevExcess - row.usage; 
            } else {
               row.netNeed = netNeed; 
               row.dispensePack = Math.ceil(netNeed / row.packSize);
               row.dispenseQty = row.dispensePack * row.packSize; 
               row.newExcess = (row.prevExcess - row.usage) + row.dispenseQty;
            }
            return row;
          }));
        };

        // ⭐️ นำ handleFileChange กลับมา
        const handleFileChange = (e) => {
          const file = e.target.files[0];
          if(file && file.type !== "application/pdf") {
            showToast("กรุณาแนบไฟล์ PDF เท่านั้น", "error");
            e.target.value = null;
            return;
          }
          setProofFile(file);
        };

        const handleSubmit = async () => {
          if(!proofFile && !editReqId) return showToast('กรุณาแนบไฟล์ใบรายการใช้ยาจาก JHCIS (PDF)', 'error');
          setIsSubmitting(true);
          
          try {
            const processSave = async (fileUrl) => {
               const sanitizedItems = items.map(item => ({
                  drugId: item.drugId || "", name: item.name || "N/A", unit: item.unit || "",
                  packSize: item.packSize || 1, avgUsage: item.avgUsage || 0, prevExcess: item.prevExcess || 0,
                  usage: item.usage || 0, vmiTarget: item.vmiTarget || 0, netNeed: item.netNeed || 0,
                  dispensePack: item.dispensePack || 0, dispenseQty: item.dispenseQty || 0, newExcess: item.newExcess || 0
               }));

               if (editReqId) {
                  const payload = { items: sanitizedItems, updated_at: firebase.firestore.FieldValue.serverTimestamp() };
                  if (fileUrl) payload.pdf_url = fileUrl; 
                  await db.collection('requisitions').doc(editReqId).update(payload);
                  showToast('อัปเดตใบเบิกสำเร็จ');
               } else {
                  const newId = `REQ-${currentYear}-${String(currentMonth).padStart(2, '0')}-${Math.floor(Math.random()*1000).toString().padStart(3, '0')}`;
                  await db.collection('requisitions').doc(newId).set({
                    hospitalId: hospId, month: currentMonth, year: currentYear, status: 'Pending',
                    pdf_url: fileUrl || "", items: sanitizedItems, created_at: firebase.firestore.FieldValue.serverTimestamp()
                  });
                  showToast('ส่งเรื่องเติมยาสำเร็จ');
               }
               await refreshData();
               setEditReqId(null);
               setCurrentView('dashboard');
            };

            if (proofFile) {
              const reader = new FileReader();
              reader.onload = async (event) => {
                const base64Str = event.target.result.split(',')[1];
                let fileUrl = "";
                if(GAS_DRIVE_URL.includes('/exec')) {
                  const uploadRes = await fetch(GAS_DRIVE_URL, {
                    method: 'POST',
                    body: JSON.stringify({ filename: `Rxfill_${hospId}_${currentMonth}_${currentYear}.pdf`, mimeType: 'application/pdf', base64: base64Str })
                  });
                  const uploadData = await uploadRes.json();
                  if(uploadData.status === 'success') fileUrl = uploadData.url || "";
                }
                processSave(fileUrl);
              };
              reader.readAsDataURL(proofFile);
            } else {
              processSave(""); 
            }
          } catch (e) {
            showToast('เกิดข้อผิดพลาด: ' + e.message, 'error');
            setIsSubmitting(false);
          }
        };

        const filteredItems = items.filter(item => {
          const matchSearch = item.name.toLowerCase().includes(searchTerm.toLowerCase()) || String(item.drugId).includes(searchTerm.toLowerCase());
          const isDrug = String(item.drugId).length >= 5;
          const matchType = filterType === 'all' ? true : filterType === 'drug' ? isDrug : !isDrug;
          const matchUsage = showUsedOnly ? item.usage > 0 : true;
          return matchSearch && matchType && matchUsage;
        });

        return (
          <div className="bg-white rounded-2xl shadow-sm p-8 border border-slate-100 animate-fade-in">
            <div className="flex justify-between items-center mb-6 pb-4 border-b border-slate-100">
              <div>
                <h2 className="text-2xl font-bold text-slate-800">
                  {editReqId ? `แก้ไขใบเบิกยารอบ ${currentMonth}/${currentYear}` : `ทำเรื่องเติมยารอบใหม่ (${currentMonth}/${currentYear})`}
                </h2>
                <p className="text-slate-500 mt-1">กรุณาระบุยอดใช้จริง (25 เดือนที่แล้ว - 25 เดือนนี้)</p>
              </div>
              <button onClick={() => {setEditReqId(null); setCurrentView('dashboard');}} className="text-slate-400 hover:text-slate-600 bg-slate-100 px-4 py-2 rounded-xl font-medium">ยกเลิก</button>
            </div>

            <div className="flex flex-col sm:flex-row bg-emerald-50 p-4 rounded-xl mb-6 items-start sm:items-center border border-emerald-100 gap-4">
              <div className="flex items-center flex-grow">
                <i className="fa-solid fa-calculator text-emerald-500 text-2xl mr-4"></i>
                <div>
                  <div className="font-bold text-emerald-800">ตั้งค่าตัวคูณ (Safety Stock)</div>
                  <div className="text-sm text-emerald-600">เป้าหมาย VMI = ค่าเฉลี่ย 3 เดือน x ตัวคูณ</div>
                </div>
              </div>
              <select disabled={!isAdmin} value={multiplier} onChange={handleMultiplierChange} className="bg-white border border-emerald-200 text-emerald-800 rounded-lg p-3 font-bold outline-none shadow-sm min-w-[200px] disabled:opacity-70 disabled:bg-slate-100 disabled:cursor-not-allowed">
                <option value={1.25}>รอบ 7 วัน (x1.25)</option>
                <option value={1.5}>รอบ 14 วัน (x1.5)</option>
                <option value={2.0}>รอบ 1 เดือน (x2.0)</option>
              </select>
            </div>

            <div className="flex flex-col md:flex-row gap-4 mb-6">
              <div className="relative flex-grow">
                <i className="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-400"></i>
                <input type="text" placeholder="ค้นหารายการ (ชื่อ หรือ รหัส)..." className="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 transition font-medium" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
              </div>
              <div className="flex gap-2 shrink-0 bg-slate-100 p-1 rounded-xl">
                <button onClick={()=>setFilterType('all')} className={`px-4 py-2 rounded-lg font-bold text-sm transition ${filterType==='all'?'bg-white shadow text-emerald-700':'text-slate-500 hover:bg-slate-200'}`}>ทั้งหมด</button>
                <button onClick={()=>setFilterType('drug')} className={`px-4 py-2 rounded-lg font-bold text-sm transition ${filterType==='drug'?'bg-white shadow text-emerald-700':'text-slate-500 hover:bg-slate-200'}`}>เฉพาะยา</button>
                <button onClick={()=>setFilterType('supply')} className={`px-4 py-2 rounded-lg font-bold text-sm transition ${filterType==='supply'?'bg-white shadow text-emerald-700':'text-slate-500 hover:bg-slate-200'}`}>เวชภัณฑ์ฯ</button>
              </div>
              <label className="flex items-center gap-2 cursor-pointer bg-amber-50 px-4 rounded-xl border border-amber-200 text-amber-800 font-bold shrink-0">
                <input type="checkbox" className="w-5 h-5 accent-amber-500" checked={showUsedOnly} onChange={e=>setShowUsedOnly(e.target.checked)} /> แสดงเฉพาะที่ระบุยอด
              </label>
            </div>

            <div className="overflow-x-auto mb-8 border border-slate-200 rounded-xl max-h-[500px] overflow-y-auto">
              <table className="w-full text-left border-collapse whitespace-nowrap">
                <thead className="sticky top-0 z-10 shadow-sm">
                  <tr className="bg-slate-100 text-slate-700 text-sm border-b border-slate-200">
                    <th className="p-4 font-bold">รายการยา <span className="font-normal text-xs text-slate-400 ml-1">[รหัส]</span></th>
                    <th className="p-4 text-center">Pack</th>
                    <th className="p-4 text-center bg-blue-50/80 border-x border-blue-100">ยอดยกมา<br/><span className="font-normal text-xs">(A)</span></th>
                    <th className="p-4 text-center bg-amber-100 text-amber-800 border-r border-amber-200">ยอดใช้ 1 เดือน (หน่วยย่อย)<br/><span className="font-normal text-xs">(กรอกข้อมูล - B)</span></th>
                    <th className="p-4 text-center bg-slate-50/80">เฉลี่ย 3ด.<br/><span className="font-normal text-xs">(Hist)</span></th>
                    <th className="p-4 text-center text-emerald-700 bg-emerald-50/80 border-l border-emerald-100">เป้าหมาย<br/><span className="font-normal text-xs">(VMI)</span></th>
                    <th className="p-4 text-center text-red-600 bg-slate-50/80">คาดว่าจัดให้<br/><span className="font-normal text-xs">(หน่วยย่อย)</span></th>
                    <th className="p-4 text-center bg-purple-50/80 border-l border-purple-100">คาดการณ์ยกไป</th>
                  </tr>
                </thead>

            const docId = `${selHosp}_${drugId}`;
            const val = Number(value) || 0;
            const refCol = field === 'par' ? 'config_par' : 'current_excess';
            const payload = field === 'par' ? {hospital_id: selHosp, drug_id: drugId, par_qty: val} : {hospital_id: selHosp, drug_id: drugId, excess_balance: val, last_updated: firebase.firestore.FieldValue.serverTimestamp()};
            await db.collection(refCol).doc(docId).set(payload, {merge:true});
            await refreshData();
          };
          
          const getHistory = (drugId) => {
             let total = 0; const today = new Date();
             for(let i=1; i<=3; i++) {

               if (oldReq && oldReq.items) {
                 const item = oldReq.items.find(it => it.drugId === drugId);
                 if (item) total += Number(item.usage);
               }
             }
             return { total, avg: Math.ceil(total / 3) };
          };

          const listWithHistory = appDb.drugs.map(d => {
             const h = getHistory(d.drug_id);
             return { ...d, histTotal: h.total, histAvg: h.avg };
          }).sort(sortDrugs);

          return (
             <div className="p-6">
               <select className="border-2 border-emerald-300 text-emerald-800 rounded-lg p-2 mb-6 w-64 font-bold outline-none" value={selHosp} onChange={e=>setSelHosp(e.target.value)}>
                 {appDb.hospitals.map(h=><option key={h.id} value={h.hospital_id}>{h.hospital_name}</option>)}
               </select>
               <table className="w-full text-left text-sm border"><thead className="bg-slate-100"><tr><th className="p-3 border-b">รายการยา</th><th className="p-3 border-b text-center bg-blue-50">ยอดใช้ 3 ด.</th><th className="p-3 border-b text-center bg-blue-50">เฉลี่ย 1 ด.</th><th className="p-3 border-b text-center">Par Stock (อ้างอิง)</th><th className="p-3 border-b text-center">ยอดยกมาปัจจุบัน</th></tr></thead>
                 <tbody>{listWithHistory.map(d=>{
                    const par = appDb.parLevels.find(p=>p.hospital_id===selHosp && p.drug_id===d.drug_id)?.par_qty || 0;
                    const bal = appDb.balances.find(b=>b.hospital_id===selHosp && b.drug_id===d.drug_id)?.excess_balance || 0;
                    return <tr key={d.id} className="border-b hover:bg-slate-50"><td className="p-3 font-bold text-slate-700">{d.drug_name} <span className="text-xs text-slate-500 font-normal ml-1">[{d.drug_id}]</span></td><td className="p-3 text-center text-slate-500 bg-blue-50/20">{d.histTotal}</td><td className="p-3 text-center text-blue-600 font-bold bg-blue-50/20">{d.histAvg}</td><td className="p-3 text-center"><input type="number" className="border border-slate-300 rounded p-1 w-24 text-center text-emerald-700 font-bold outline-none focus:ring-2 focus:ring-emerald-500" defaultValue={par} onBlur={e=>handleUpdate(d.drug_id, 'par', e.target.value)}/></td><td className="p-3 text-center"><input type="number" className="border border-slate-300 rounded p-1 w-24 text-center text-amber-700 font-bold outline-none focus:ring-2 focus:ring-amber-500" defaultValue={bal} onBlur={e=>handleUpdate(d.drug_id, 'bal', e.target.value)}/></td></tr>
                 })}</tbody>
               </table>
               <p className="text-xs text-slate-400 mt-4"><i className="fa-solid fa-cloud-arrow-up mr-1"></i> ระบบจะบันทึกข้อมูลเข้าเซิร์ฟเวอร์อัตโนมัติเมื่อพิมพ์เสร็จและคลิกออกนอกช่อง (Auto-save)</p>
             </div>
          );
        };

        const DeleteConfirmModal = () => {
          if (!deleteTarget) return null;
          return (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-[100] px-4 animate-fade-in">
              <div className="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl">
                <div className="flex items-center text-red-500 mb-4">
                  <i className="fa-solid fa-triangle-exclamation text-3xl mr-3"></i>
                  <h3 className="text-xl font-bold text-slate-800">ยืนยันการลบข้อมูล</h3>
                </div>
                <p className="text-slate-500 mb-6">คุณแน่ใจหรือไม่ว่าต้องการลบข้อมูลนี้? การกระทำนี้ไม่สามารถย้อนกลับได้</p>
                <div className="flex justify-end gap-3">
                  <button onClick={() => setDeleteTarget(null)} className="px-4 py-2 bg-slate-100 text-slate-700 rounded-xl font-semibold hover:bg-slate-200 transition">ยกเลิก</button>
                  <button onClick={executeDelete} className="px-4 py-2 bg-red-500 text-white rounded-xl font-semibold hover:bg-red-600 shadow-lg shadow-red-200 transition">ยืนยันลบข้อมูล</button>
                </div>
              </div>
            </div>
          );
        };

        return (
          <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden animate-fade-in relative">
            <div className="bg-slate-800 text-white p-6">
              <h2 className="text-2xl font-bold"><i className="fa-solid fa-server mr-2 text-emerald-400"></i> จัดการฐานข้อมูล (Admin Console)</h2>
            </div>
            <div className="flex overflow-x-auto border-b bg-slate-50 whitespace-nowrap scrollbar-hide">
              <TabBtn id="hospitals" icon="fa-hospital" label="รพ.สต." />
              <TabBtn id="drugs" icon="fa-pills" label="รายการยาและราคา" />
              <TabBtn id="units" icon="fa-box" label="หน่วยนับ" />
              <TabBtn id="stock" icon="fa-cubes" label="ตั้งค่า Initial Stock" />
              <TabBtn id="users" icon="fa-users" label="ผู้ใช้งาน" />
            </div>
            <div className="bg-white">
              {activeTab === 'hospitals' && <HospitalManager />}
              {activeTab === 'drugs' && <DrugManager />}
              {activeTab === 'units' && <UnitManager />}
              {activeTab === 'stock' && <StockManager />}
              {activeTab === 'users' && <UserManager />}
            </div>
            <DeleteConfirmModal />
          </div>
        );
      };

      // ==========================================
      // ROUTING
      // ==========================================

      if (currentView === 'login') return <><LoginView />{toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}</>;
      if (currentView === 'register') return <><RegisterView />{toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}</>;

      return (
        <div className="flex flex-col min-h-screen lg:flex-row">
          <div className="w-full lg:w-72 bg-slate-900 text-white flex flex-col no-print shrink-0 shadow-2xl z-10">
            <div className="p-6 flex items-center border-b border-slate-800 bg-slate-900">
              <div className="bg-gradient-main p-2 rounded-lg mr-3 shadow-lg"><i className="fa-solid fa-truck-medical text-white"></i></div>
              <h1 className="text-xl font-extrabold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-emerald-400">Sawee Rxfill</h1>
            </div>
            <nav className="flex-1 p-4 space-y-2 overflow-y-auto">
              <button onClick={() => setCurrentView('dashboard')} className={`w-full text-left p-4 rounded-xl font-bold transition flex items-center ${currentView==='dashboard'?'bg-emerald-600 text-white shadow-lg shadow-emerald-900/50':'hover:bg-slate-800 text-slate-300'}`}><i className="fa-solid fa-house w-6 text-center mr-2"></i> แดชบอร์ด</button>
              {currentUser?.role === 'hospital' && <button onClick={() => setCurrentView('create_req')} className={`w-full text-left p-4 rounded-xl font-bold transition flex items-center ${currentView==='create_req'?'bg-emerald-600 text-white shadow-lg shadow-emerald-900/50':'hover:bg-slate-800 text-slate-300'}`}><i className="fa-solid fa-boxes-packing w-6 text-center mr-2"></i> เบิกยา / เติมยา</button>}
              {currentUser?.role === 'admin' && <button onClick={() => setCurrentView('config')} className={`w-full text-left p-4 rounded-xl font-bold transition flex items-center ${currentView==='config'?'bg-emerald-600 text-white shadow-lg shadow-emerald-900/50':'hover:bg-slate-800 text-slate-300'}`}><i className="fa-solid fa-database w-6 text-center mr-2"></i> จัดการฐานข้อมูล</button>}
            </nav>
            <div className="p-5 border-t border-slate-800 bg-slate-900">
              <div className="flex items-center mb-4 text-sm text-slate-300 font-medium bg-slate-800 p-3 rounded-xl border border-slate-700">
                <div className="w-8 h-8 rounded-full bg-emerald-500 text-white flex items-center justify-center font-bold mr-3">{currentUser?.name?.charAt(0)}</div>
                <div className="truncate">{currentUser?.name}</div>
              </div>
              <button onClick={() => auth.signOut()} className="w-full text-left p-3 rounded-xl text-red-400 hover:bg-red-500/10 hover:text-red-300 font-bold transition flex items-center justify-center border border-red-500/30"><i className="fa-solid fa-power-off mr-2"></i> ออกจากระบบ</button>
            </div>
          </div>
          
          <div className="flex-1 p-4 lg:p-10 overflow-auto bg-[#f8fafc] w-full">
            <div className="max-w-7xl mx-auto pb-20">
              {currentView === 'dashboard' && <DashboardView />}
              {currentView === 'create_req' && <CreateReqView />}
              {currentView === 'view_req' && <ViewReqView />}
              {currentView === 'adjust_stock' && <AdjustStockView />}
              {currentView === 'config' && <AdminConfigView />}
            </div>
          </div>
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
